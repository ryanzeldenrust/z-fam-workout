.block{background:linear-gradient(180deg,#fffdf5,#eee6ff);border:3px solid #0b0812;border-radius:14px;box-shadow:4px 4px 0 rgba(0,0,0,.32);padding:12px;margin-bottom:12px}.block h3{font-family:'Gill Sans MT','Arial Rounded MT Bold',Verdana,sans-serif;font-size:20px;margin-bottom:8px;color:var(--purple2)}.exercise{border:2px solid #0b0812;border-radius:11px;background:#f8f1ff;padding:10px;margin:8px 0}.exercise h4{font-size:15px;margin-bottom:4px}.rx{font-size:12px;font-weight:900;color:var(--teal2)}.cue{font-size:11px;font-weight:800;color:#5a4f68;line-height:1.35;margin-top:5px}.check{display:grid;grid-template-columns:28px 1fr;gap:8px;align-items:start}.check input{width:24px;height:24px;accent-color:var(--teal)}.inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.field{display:grid;gap:4px}.field label{font-size:10px;text-transform:uppercase;font-weight:900;color:#4f4564}.field input,.field select,.field textarea{min-height:41px;border:2px solid #0b0812;border-radius:9px;background:white;padding:8px;width:100%;font-weight:800}.field textarea{min-height:72px;resize:vertical}.history-item{border:2px solid #0b0812;border-radius:11px;background:#f8f1ff;padding:10px;margin-bottom:8px}.history-item b{display:block;font-size:14px;color:var(--purple2)}.history-item span{display:block;font-size:11px;color:#5a4f68;font-weight:800;margin-top:3px}.notice{background:linear-gradient(180deg,#fffdf5,#c9f7f7);border:3px solid #0b0812;border-radius:12px;box-shadow:3px 3px 0 #0b0812;padding:10px;font-size:12px;font-weight:900;line-height:1.35}.exercise{cursor:pointer;transition:opacity .15s ease,filter .15s ease,transform .15s ease}.exercise.done{opacity:.42;filter:grayscale(.35);transform:scale(.985)}.exercise.done:after{content:"DONE";display:block;margin-top:8px;font-weight:900;color:var(--teal2)}.target{margin-top:7px;padding:7px 8px;border:2px solid #0b0812;border-radius:9px;background:linear-gradient(180deg,#eaffff,#c9f7f7);font-size:12px;font-weight:900 /* Final 3D polish */.card,.mission,.block,.exercise,.notice,.history-item,.settings-row{position:relative;overflow:hidden}.card:before,.mission:before,.block:before,.exercise:before,.notice:before{content:"";position:absolute;left:10px;right:10px;top:6px;height:22px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,0));pointer-events:none}.card,.mission,.block{box-shadow:6px 8px 0 rgba(0,0,0,.45),0 18px 28px rgba(0,0,0,.34),inset 0 2px 0 rgba(255,255,255,.5)}.profile-btn,.btn,.nav button,.stat,.week-badge{box-shadow:4px 5px 0 #0b0812,0 11px 18px rgba(0,0,0,.28),inset 0 2px 0 rgba(255,255,255,.58)}.btn:active,.profile-btn:active,.nav button:active{transform:translateY(3px);box-shadow:2px 2px 0 #0b0812,inset 0 2px 0 rgba(255,255,255,.45)}.header{box-shadow:0 7px 0 #0b0812,0 18px 35px rgba(0,0,0,.38),inset 0 2px 0 rgba(255,255,255,.42)}.nav{height:80px}.nav button{font-family:'Arial Rounded MT Bold','Arial Rounded MT',Verdana,sans-serif;font-size:13px}.section-title,.block h3{font-weight:900}.mission h3,.exercise h4,.profile-btn,.btn,.stat b{font-family:'Arial Rounded MT Bold','Arial Rounded MT',Verdana,sans-serif}/* Metal reflection pass */#app{border-left:2px solid rgba(255,255,255,.18);border-right:2px solid rgba(0,0,0,.8);box-shadow:0 0 0 3px #08050f,0 24px 70px rgba(0,0,0,.75),inset 0 0 36px rgba(255,255,255,.05)}.screen{background:linear-gradient(115deg,rgba(255,255,255,.06),transparent 18%,rgba(0,182,199,.14) 32%,transparent 46%,rgba(255,255,255,.05) 58%,transparent 76%),radial-gradient(circle at 15% 0%,rgba(0,182,199,.38),transparent 185px),radial-gradient(circle at 92% 10%,rgba(105,51,163,.42),transparent 210px),linear-gradient(180deg,#2d1850,#130d20 62%,#0d0916)}.card:after,.mission:after,.block:after,.run-hero:after{content:"";position:absolute;inset:3px 5px auto 5px;height:38%;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,.38),rgba(255,255,255,.12) 38%,rgba(255,255,255,0));pointer-events:no <script type="module">

};
const state={tab:'home',profile:null,profiles:[],week:null,db:null,sessions:[],runs:[],sets:[],maxes:{},weekCounts:{},workoutKey:'workout_a'};
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
function d(v){const [y,m,day]=v.split('-').map(Number);return new Date(y,m-1,day)}function addDays(x,n){const y=new Date(x);y.setDate(y.getDate()+n);return y}function fmt(x){return x.toLocaleDateString(undefined,{month:'short',day:'numeric'})}function uuid(){return crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())}
function blockFor(w){return PROGRAM.progressionBlocks.find(b=>w>=b.startWeek&&w<=b.endWeek)||PROGRAM.progressionBlocks[0]}function currentWeek(){const s=d(PROGRAM.meta.startDate),e=d(PROGRAM.meta.endDate),n=new Date();const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());if(today<s)return 1;if(today>e)return 26;return Math.min(26,Math.floor(Math.floor((today-s)/86400000)/7)+1)}
function initWeek(){const num=currentWeek(),run=PROGRAM.runningProgression.find(r=>r.week===num),b=blockFor(num),start=d(run.weekStart);state.week={num,start,end:addDays(start,6),run,b,deload:PROGRAM.deloadWeeks.includes(num)}}
function firebaseReady(){return !!(FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.projectId&&FIREBASE_CONFIG.appId)}function connect(){state.db=firebaseReady()?getFirestore(initializeApp(FIREBASE_CONFIG)):null}
function local(name){return JSON.parse(localStorage.getItem('zfam_'+name)||'[]')}function saveLocal(name,val){localStorage.setItem('zfam_'+name,JSON.stringify(val))}function num(v){if(v===''||v==null)return null;const n=Number(v);return Number.isFinite(n)?n:null}function sec(t){const p=String(t).trim().split(':').map(Number);if(p.some(x=>!Number.isFinite(x)))return null;return p.length===2?p[0]*60+p[1]:p.length===3?p[0]*3600+p[1]*60+p[2]:null}function secFmt(s){if(!s)return'';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`:`${m}:${String(x).padStart(2,'0')}`}
async function loadProfiles(){const saved=localStorage.zfam_profile;if(!state.db){state.profiles=PROGRAM.users.map(u=>({id:u.id,name:u.name}));state.profile=state.profiles.find(p=>p.id===saved)||state.profiles[0];return}let snap=await getDocs(collection(state.db,'profiles'));if(snap.empty){await Promise.all(PROGRAM.users.map(u=>setDoc(doc(state.db,'profiles',u.id),{id:u.id,name:u.name,created_at:new Date().toISOString()})));snap=await getDocs(collection(state.db,'profiles'))}state.profiles=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));state.profile=state.profiles.find(p=>p.id===saved||p.name===saved)||state.profiles[0]}
async function loadLogs(){if(!state.profile)return;if(!state.db){state.sessions=local('workout_sessions').filter(x=>x.profile_id===state.profile.id);state.runs=local('run_logs').filter(x=>x.profile_id===state.profile.id);state.sets=local('workout_set_logs');return}const [s,r]=await Promise.all([getDocs(query(collection(state.db,'workout_sessions'),where('profile_id','==',state.profile.id))),getDocs(query(collection(state.db,'run_logs'),where('profile_id','==',state.profile.id)))]);state.sessions=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(b.completed_at).localeCompare(String(a.completed_at))).slice(0,100);state.runs=r.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(b.completed_at).localeCompare(String(a.completed_at))).slice(0,100);state.sets=[]}
function computeWeekCounts(sessions,runs){const map={};sessions.forEach(x=>{if(!x.profile_id||!x.week_number)return;const k=x.profile_id+'_'+x.week_number;map[k]=map[k]||{a:false,b:false,r:false};if(x.workout_key==='workout_a')map[k].a=true;if(x.workout_key==='workout_b')map[k].b=true});runs.forEach(x=>{if(!x.profile_id||!x.week_number)return;const k=x.profile_id+'_'+x.week_number;map[k]=map[k]||{a:false,b:false,r:false};map[k].r=true});const counts={};Object.keys(map).forEach(k=>{const c=map[k];if(c.a&&c.b&&c.r){const profileId=k.replace(/_\d+$/,'');counts[profileId]=(counts[profileId]||0)+1}});return counts}
async function loadWeekCounts(){if(!state.profiles.length){state.weekCounts={};return}if(!state.db){state.weekCounts=computeWeekCounts(local('workout_sessions'),local('run_logs'));return}const [s,r]=await Promise.all([getDocs(collection(state.db,'workout_sessions')),getDocs(collection(state.db,'run_logs'))]);state.weekCounts=computeWeekCounts(s.docs.map(d=>d.data()),r.docs.map(d=>d.data()))}
function isCurrentWeekComplete(){const c=done();return !!(c.a&&c.b&&c.r)}function weeklyBadgeHtml(p){const count=state.weekCounts[p.id]||0;return`<span class="weekly-badge"><img src="Images/weekly mission complete.png?v=20260523-weekalpha" alt="Weekly missions completed">${count}</span>`}function done(){const w=state.week.num;return{a:state.sessions.some(x=>x.week_number===w&&x.workout_key==='workout_a'),b:state.sessions.some(x=>x.week_number===w&&x.workout_key==='workout_b'),r:state.runs.some(x=>x.week_number===w)}}function nextKey(){const c=done();if(!c.a)return'workout_a';if(!c.b)return'workout_b';if(!c.r)return'run_day';return'workout_a'}
function rx(ex){return ex.prescription||(ex.prescriptionByBlock&&ex.prescriptionByBlock[state.week.b.key])||''}function setsFor(ex){const m=rx(ex).match(/(\d+)\s*x/i);return m?Number(m[1]):3}function key(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'_')}function esc(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
const MAX_EXERCISES=['Hang clean','Half squat','Trap bar jump','RDL','Box step-up','Bench press','Seated row','Lat pulldown','Leg curl','Leg extension','Shoulder press machine or dumbbell shoulder press','Curl machine or dumbbell curls','Triceps press'];
function pctFor(ex){const n=ex.name.toLowerCase(),b=state.week.b.key;if(n.includes('trap bar jump'))return b==='block_1'?.30:b==='block_2'?.25:.20;if(n.includes('hang clean'))return b==='block_1'?.75:b==='block_2'?.70:.60;if(n.includes('half squat'))return b==='block_1'?.85:b==='block_2'?.75:.65;if(n.includes('rdl')||n.includes('bench')||n.includes('row')||n.includes('pulldown')||n.includes('step-up'))return b==='block_1'?.80:b==='block_2'?.70:.60;if(n.includes('leg curl')||n.includes('leg extension')||n.includes('shoulder')||n.includes('curl')||n.includes('triceps'))return b==='block_1'?.70:b==='block_2'?.65:.60;return null}
function round5(x){return Math.round(x/5)*5}function targetFor(ex){const max=Number(state.maxes[ex.name]||0),pct=pctFor(ex);if(!max||!pct)return'';return `${round5(max*pct)} lb today (${Math.round(pct*100)}% of max)`}
const MILEAGE_ORIGIN='Eagle Lake, MN';const MILEAGE_MILESTONES=[{miles:6,name:'St. Clair, MN'},{miles:48,name:'Yellow Candy Barn, Jordan'},{miles:76,name:'Mall of America'},{miles:88,name:'SPAM Museum, Austin'}];
function selectedName(){return state.profile?String(state.profile.name):''}function currentProgramUser(){const id=state.profile&&String(state.profile.id).toLowerCase(),name=selectedName().toLowerCase();return PROGRAM.users.find(u=>String(u.id).toLowerCase()===id||String(u.name).toLowerCase()===name)||{cardioMode:'run',cardioMultiplier:1}}function usesBike(){return currentProgramUser().cardioMode==='bike'}function isRyan(){return selectedName().toLowerCase()==='ryan'}function cardioKind(){return usesBike()?'Bike':'Run'}function cardioVerb(){return usesBike()?'Ride':'Run'}function cardioTarget(){const m=Number(state.week.run.targetDistanceMiles||0),mult=Number(currentProgramUser().cardioMultiplier||1);return Number((m*mult).toFixed(2))}const ASSETS={barbell:'Images/barbell.png?v=20260523-alpha',trapbar:'Images/Trap Bar.png?v=20260523-alpha',shoe:'Images/Shoe logo.png?v=20260523-alpha',bike:'Images/Bike Logo.png?v=20260523-alpha'};function cardioIcon(){return usesBike()?ASSETS.bike:ASSETS.shoe}function missionIcon(k){return k==='workout_a'?ASSETS.barbell:k==='workout_b'?ASSETS.trapbar:cardioIcon()}function milesLabel(v){return Number(v||0).toFixed(2).replace(/\.?0+$/,'')}function runLogKind(x){return String((x&&x.run_type)||'').toLowerCase().includes('bike')?'Bike':'Run'}function mileageQuest(total){const miles=Number(total||0),last=MILEAGE_MILESTONES[MILEAGE_MILESTONES.length-1];let reached=null;for(const m of MILEAGE_MILESTONES){if(miles>=m.miles)reached=m;else break}const next=MILEAGE_MILESTONES.find(m=>miles<m.miles);if(!next)return{label:`${MILEAGE_ORIGIN} to ${last.name}`,next:'Minnesota landmark tour complete. You cleared every stop.',pct:100,markerPct:96};const start=reached?reached.miles:0,pct=Math.max(3,Math.min(100,((miles-start)/(next.miles-start))*100)),markerPct=Math.max(4,Math.min(96,pct));return{label:reached?`${MILEAGE_ORIGIN} to ${reached.name}`:`Leaving ${MILEAGE_ORIGIN}`,next:`${milesLabel(next.miles-miles)} mi to ${next.name}`,pct,markerPct}}async function loadMaxes(){if(!state.profile){state.maxes={};return}const localKey='zfam_maxes_'+state.profile.id;state.maxes=JSON.parse(localStorage.getItem(localKey)||'{}');if(!state.db)return;const snap=await getDocs(query(collection(state.db,'profile_lift_maxes'),where('profile_id','==',state.profile.id)));state.maxes={};snap.docs.forEach(d=>{const row=d.data();state.maxes[row.exercise_name]=Number(row.max_weight)});localStorage.setItem(localKey,JSON.stringify(state.maxes))}
function saveMaxesLocal(){if(state.profile)localStorage.setItem('zfam_maxes_'+state.profile.id,JSON.stringify(state.maxes))}async function saveMaxes(){saveMaxesLocal();if(!state.db||!state.profile)return true;try{const old=await getDocs(query(collection(state.db,'profile_lift_maxes'),where('profile_id','==',state.profile.id)));const batch=writeBatch(state.db);old.docs.forEach(d=>batch.delete(d.ref));Object.entries(state.maxes).forEach(([exercise_name,max_weight])=>batch.set(doc(state.db,'profile_lift_maxes',`${state.profile.id}_${key(exercise_name)}`),{profile_id:state.profile.id,exercise_name,max_weight,updated_at:new Date().toISOString()}));await batch.commit();return true}catch(err){alert(err.message);return false}}function setTab(t){state.tab=t;$$('.view').forEach(v=>v.classList.toggle('active',v.id===t));$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));render();$('.screen').scrollTop=0}
function renderHeader(){$('#weekBadge').textContent='W'+state.week.num;$('#weekLine').textContent=`${fmt(state.week.start)} - ${fmt(state.week.end)} | ${state.week.b.name}${state.week.deload?' | Deload':''}`}
function renderHome(){const c=done(),count=[c.a,c.b,c.r].filter(Boolean).length,n=nextKey(),cardio=cardioKind();$('#home').innerHTML=`<div class="card"><div class="section-title">Choose Player</div><div class="profile-grid">${state.profiles.map(p=>`<button class="profile-btn ${state.profile&&p.id===state.profile.id?'active':''}" data-profile="${p.id}"><span class="profile-name">${p.name}</span>${weeklyBadgeHtml(p)}</button>`).join('')}</div></div><div class="card dark"><div class="section-title">This Week</div><div class="stats"><div class="stat"><b>${c.a?'YES':'NO'}</b><span>Workout A</span></div><div class="stat"><b>${c.b?'YES':'NO'}</b><span>Workout B</span></div><div class="stat"><b>${c.r?'YES':'NO'}</b><span>${cardio} Day</span></div></div><div class="progress"><div class="bar" style="width:${count/3*100}%"></div></div></div><div class="card"><div class="section-title">Next Mission</div>${mission('workout_a',n)}${mission('workout_b',n)}${mission('run_day',n)}</div>`;$$('[data-profile]').forEach(b=>b.onclick=async()=>{state.profile=state.profiles.find(p=>p.id===b.dataset.profile);localStorage.zfam_profile=state.profile.id;await loadMaxes();await loadLogs();await loadWeekCounts();renderHome()})}function mission(k,n){const w=PROGRAM.workouts[k],isCardio=k==='run_day',title=isCardio?`${cardioKind()} Day: Engine + Achilles`:w.name,summary=isCardio?`${milesLabel(cardioTarget())} mile ${usesBike()?'bike target':'target'}`:w.purpose.slice(0,3).join(' | '),icon=missionIcon(k);return`<div class="mission ${k===n?'recommended':''}"><div class="mission-icon"><img src="${icon}" alt=""></div><div class="mission-copy"><h3>${title}</h3><p>${summary}</p></div><button class="btn" onclick="openMission('${k}')">${k===n?'Start Next':'Open'}</button></div>`}function openMission(k){if(k==='run_day')setTab('run');else{state.workoutKey=k;setTab('workout')}}window.openMission=openMission;
function renderWorkout(){const w=PROGRAM.workouts[state.workoutKey],icon=missionIcon(state.workoutKey);$('#workout').innerHTML=`<div class="card dark hero-card workout-hero"><div><div class="section-title">${w.name}</div><div class="small">${w.purpose.join(' | ')}</div></div><img class="hero-art" src="${icon}" alt=""></div><form id="liftForm">${w.blocks.map((b,bi)=>blockHtml(b,bi)).join('')}<div class="card"><button class="btn">Save Workout</button></div></form>`;$('#liftForm').onsubmit=saveWorkout;bindDoneCards($('#workout'))}function blockHtml(b,bi){const list=b.name.toLowerCase().includes('warm-up')?b.exercises.slice(0,3):b.exercises;return`<div class="block"><h3>${b.name}</h3>${list.map((ex,ei)=>exerciseHtml(b,ex,bi,ei)).join('')}</div>`}function intensity(ex){const t=rx(ex).toLowerCase();if(t.includes('heavy'))return'Heavy work';if(t.includes('moderate'))return'Moderate work';if(t.includes('light'))return'Light / fast';if(t.includes('fast'))return'Speed intent';return'Quality reps'}
function exerciseHtml(b,ex,bi,ei){const k=`${bi}_${ei}_${key(ex.name)}`,target=targetFor(ex);return`<div class="exercise tap-exercise" data-done-name="${k}_done"><input class="done-input" name="${k}_done" type="hidden" value=""><h4>${ex.name}</h4><div class="rx">${rx(ex)} | ${intensity(ex)}</div>${target?`<div class="target">Use ${target}</div>`:''}<div class="cue">${ex.cue||''}</div></div>`}
function showComplete(type='day'){const modal=$('#completeModal');if(!modal){setTab('home');return}const isWeek=type==='week';const img=modal.querySelector('img');modal.classList.toggle('weekly',isWeek);modal.setAttribute('aria-label',isWeek?'Weekly mission completed':'Day complete');if(img){img.src=isWeek?'Images/weekly mission complete.png?v=20260523-weekalpha':'Images/Day Complete.png?v=20260523-dayalpha';img.alt=isWeek?'Weekly mission completed':'Day complete, workout saved'}modal.classList.remove('hidden');const close=modal.querySelector('.complete-close');const done=()=>{modal.classList.add('hidden');modal.classList.remove('weekly');setTab('home')};close.onclick=done;modal.onclick=e=>{if(e.target===modal)done()}}function bindDoneCards(root){root.querySelectorAll('.tap-exercise').forEach(card=>card.onclick=()=>{card.classList.toggle('done');const input=card.querySelector('.done-input');input.value=card.classList.contains('done')?'yes':''})}async function saveWorkout(e){e.preventDefault();const weekWasComplete=isCurrentWeekComplete();const f=new FormData(e.target),w=PROGRAM.workouts[state.workoutKey],id=uuid(),now=new Date().toISOString();const session={id,profile_id:state.profile.id,workout_key:w.key,week_number:state.week.num,started_at:now,completed_at:now,notes:null,readiness_score:null,knee_pain_score:null,achilles_pain_score:null};let logs=[];w.blocks.forEach((b,bi)=>b.exercises.forEach((ex,ei)=>{const k=`${bi}_${ei}_${key(ex.name)}`;if(!f.get(`${k}_done`))return;const topWeight=num(f.get(`${k}_weight`));const feel=f.get(`${k}_feel`)||'';logs.push(log(id,ex.name,1,{weight:topWeight,reps:null,quality_rating:null,notes:[rx(ex),intensity(ex),feel].filter(Boolean).join(' | ')}))}));if(state.db){try{const batch=writeBatch(state.db);batch.set(doc(state.db,'workout_sessions',session.id),session);logs.forEach(x=>batch.set(doc(state.db,'workout_set_logs',x.id),x));await batch.commit()}catch(err){return alert(err.message)}}else{const a=local('workout_sessions');a.push(session);saveLocal('workout_sessions',a);saveLocal('workout_set_logs',local('workout_set_logs').concat(logs))}await loadLogs();await loadWeekCounts();showComplete(isCurrentWeekComplete()&&!weekWasComplete?'week':'day')}function log(session_id,exercise_name,set_number,x){return{id:uuid(),session_id,exercise_name,set_number,weight:x.weight||null,reps:x.reps||null,quality_rating:x.quality_rating||null,notes:x.notes||null,created_at:new Date().toISOString()}}
function renderRun(){const w=PROGRAM.workouts.run_day,target=cardioTarget(),kind=cardioKind(),verb=cardioVerb(),icon=cardioIcon(),blocks=w.blocks.map(b=>({...b,name:b.name.replace('Run',kind)}));$('#run').innerHTML=`<div class="card dark run-hero hero-card"><div><div class="section-title">${kind} Day</div><div class="run-distance">${milesLabel(target)} miles</div><div class="small">${usesBike()?'Exercise bike target. Smooth steady ride.':(state.week.run.note||'Smooth and steady.')}</div></div><img class="hero-art" src="${icon}" alt=""></div><form id="runForm">${blocks.map((b,bi)=>blockHtml(b,bi)).join('')}<div class="block"><h3>${kind} Segment</h3><div class="exercise tap-exercise run-segment"><input class="done-input" name="run_done" type="hidden" value=""><h4>${verb} ${milesLabel(target)} miles</h4><div class="rx">Distance only</div><div class="cue">Tap this card when the ${kind.toLowerCase()} is finished.</div></div></div><div class="card"><button class="btn blue">Save ${kind}</button></div></form>`;bindDoneCards($('#run'));$('#runForm').onsubmit=saveRun}async function saveRun(e){e.preventDefault();const weekWasComplete=isCurrentWeekComplete();const f=new FormData(e.target),kind=cardioKind(),target=cardioTarget();if(!f.get('run_done'))return alert(`Tap the ${kind.toLowerCase()} distance card when it is done.`);const row={id:uuid(),profile_id:state.profile.id,week_number:state.week.num,target_distance_miles:target,actual_distance_miles:target,total_time_seconds:0,run_type:kind+' distance complete',effort_score:null,knee_pain_score:null,achilles_pain_score:null,notes:null,completed_at:new Date().toISOString()};if(state.db){try{await setDoc(doc(state.db,'run_logs',row.id),row)}catch(err){return alert(err.message)}}else{const a=local('run_logs');a.push(row);saveLocal('run_logs',a)}await loadLogs();await loadWeekCounts();showComplete(isCurrentWeekComplete()&&!weekWasComplete?'week':'day')}
async function clearCollection(name){const snap=await getDocs(collection(state.db,name));let batch=writeBatch(state.db),pending=0;for(const item of snap.docs){batch.delete(item.ref);pending++;if(pending===400){await batch.commit();batch=writeBatch(state.db);pending=0}}if(pending)await batch.commit()}async function resetTestData(){if(prompt('Type RESET to clear all saved workout and run/bike days. Max weights will stay saved.')!=='RESET')return;try{if(state.db){for(const name of ['workout_sessions','workout_set_logs','run_logs'])await clearCollection(name)}else{saveLocal('workout_sessions',[]);saveLocal('workout_set_logs',[]);saveLocal('run_logs',[])}state.sessions=[];state.runs=[];state.sets=[];await loadLogs();await loadWeekCounts();alert('Saved workout and run/bike days cleared. Max weights were kept.');setTab('home')}catch(err){alert(err.message)}}function renderHistory(){const selectedBike=usesBike(),cardio=cardioKind(),cardioPlural=selectedBike?'Rides':'Runs',cardioMiles=state.runs.reduce((sum,x)=>sum+Number(x.actual_distance_miles||0),0),quest=mileageQuest(cardioMiles);const items=[...state.sessions.map(x=>({type:'Workout',title:PROGRAM.workouts[x.workout_key]?.name||x.workout_key,week:x.week_number,date:x.completed_at,notes:x.notes})),...state.runs.map(x=>({type:selectedBike?'Bike':runLogKind(x),title:`${milesLabel(x.actual_distance_miles) } mi`,week:x.week_number,date:x.completed_at,notes:x.notes}))].sort((a,b)=>String(b.date).localeCompare(String(a.date)));const workouts=items.filter(i=>i.type==='Workout').length,cardioCount=state.runs.length;$('#history').innerHTML=`<div class="card"><div class="section-title">History</div><div class="profile-grid">${state.profiles.map(p=>`<button class="profile-btn ${state.profile&&p.id===state.profile.id?'active':''}" data-history-profile="${p.id}">${p.name}</button>`).join('')}</div></div><div class="card dark"><div class="section-title">${state.profile.name} Breakdown</div><div class="stats"><div class="stat"><b>${workouts}</b><span>Workouts</span></div><div class="stat"><b>${cardioCount}</b><span>${cardioPlural}</span></div><div class="stat"><b>${milesLabel(cardioMiles)}</b><span>${cardio} Miles</span></div></div></div><div class="card quest-card"><img class="quest-art" src="${cardioIcon()}" alt=""><div class="section-title">Mileage Quest</div><div class="quest-total">${milesLabel(cardioMiles)}<span>${selectedBike?'bike miles':'run miles'}</span></div><div class="quest-line">${quest.label}</div><div class="progress quest-progress"><div class="bar" style="width:${quest.pct}%"></div><img class="quest-marker" src="${cardioIcon()}" style="left:calc(${quest.markerPct}% - 15px)" alt=""></div><div class="small"><b>Next stop:</b> ${quest.next}</div></div><div class="card"><div class="section-title">Recent Logs</div>${items.length?items.map(i=>`<div class="history-item"><b>${i.type}: ${i.title}</b><span>Week ${i.week} | ${new Date(i.date).toLocaleDateString()}</span></div>`).join(''):'<div class="small">No workouts logged yet.</div>'}</div>`;$$('[data-history-profile]').forEach(b=>b.onclick=async()=>{state.profile=state.profiles.find(p=>p.id===b.dataset.historyProfile);localStorage.zfam_profile=state.profile.id;await loadMaxes();await loadLogs();renderHistory()})}function renderSettings(){$('#settings').innerHTML=`<div class="card dark"><div class="section-title">Settings</div><div class="small">Pick a person, add maxes or best heavy weights, and the workout screen will calculate target weight for the day.</div></div><div class="card"><div class="section-title">Player Maxes</div><div class="profile-grid">${state.profiles.map(p=>`<button class="profile-btn ${state.profile&&p.id===state.profile.id?'active':''}" data-settings-profile="${p.id}">${p.name}</button>`).join('')}</div></div><form id="maxForm"><div class="card"><div class="section-title">${state.profile.name} Maxes</div>${MAX_EXERCISES.map(name=>`<div class="settings-row"><label>${name}</label><input name="${key(name)}" type="number" step="5" value="${state.maxes[name]||''}" placeholder="lb"></div>`).join('')}<button class="btn">Save Maxes</button></div></form><details class="card"><summary class="section-title">Admin</summary><div class="small">Clear saved workout and run/bike days when testing. Player names and max weights stay saved.</div><button id="resetTestDataBtn" class="btn gray" type="button">Reset Test Days</button></details>`;$$('[data-settings-profile]').forEach(b=>b.onclick=async()=>{state.profile=state.profiles.find(p=>p.id===b.dataset.settingsProfile);localStorage.zfam_profile=state.profile.id;await loadMaxes();renderSettings()});$('#maxForm').onsubmit=async e=>{e.preventDefault();MAX_EXERCISES.forEach(name=>{const v=num(new FormData(e.target).get(key(name)));if(v)state.maxes[name]=v;else delete state.maxes[name]});if(await saveMaxes())renderSettings()};$('#resetTestDataBtn').onclick=resetTestData}function render(){renderHeader();if(state.tab==='home')renderHome();if(state.tab==='workout')renderWorkout();if(state.tab==='run')renderRun();if(state.tab==='history')renderHistory();if(state.tab==='settings')renderSettings()}
async function boot(){initWeek();connect();await loadProfiles();await loadMaxes();await loadLogs();await loadWeekCounts();$$('.nav button').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));render()}boot();
</script>
